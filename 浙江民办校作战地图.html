const DELIVERY_PROGRESS = ['未启动','部署中','已部署','待验收','已完成'];
const OPPORTUNITY_STAGES = ['初步接触','需求对接','方案输出','招投标','意向签约','已流失'];
const ROLES = ['驻点销售','交付人员','服务人员','区域负责人'];
const PERSON_STATUS = ['在职','离职','调岗'];
const STAKEHOLDER_TYPES = ['决策人','对接人','影响人','技术负责人'];

const store = {
  key: 'zhejiang_private_school_battle_map',
  init() { if (!localStorage.getItem(this.key)) localStorage.setItem(this.key, JSON.stringify(this.getDefaultData())); },
  get() { try { return JSON.parse(localStorage.getItem(this.key)) || this.getDefaultData(); } catch(e){ return this.getDefaultData(); } },
  set(data) { localStorage.setItem(this.key, JSON.stringify(data)); },
  getDefaultData() { return { schools: [], deliveries: [], opportunities: [], persons: [], stakeholders: [], logs: [] }; }
};

function generateMockData() {
  const sampleSchools = [
    {city:'杭州市',names:['杭州育才外国语学校','杭州绿城育华学校','杭州文澜中学','杭州建兰中学','杭州公益中学','杭州启正中学','杭州观成实验学校']},
    {city:'宁波市',names:['宁波镇海蛟川书院','宁波兴宁中学','宁波蓝青学校','宁波科学中学','宁波东海实验学校']},
    {city:'温州市',names:['温州育英国际实验学校','温州实验中学','温州外国语学校','温州第二外国语学校','温州森马协和国际学校']},
    {city:'绍兴市',names:['绍兴市第一初级中学','绍兴鲁迅外国语学校','绍兴蕺山外国语学校','绍兴轻纺城中学']},
    {city:'嘉兴市',names:['嘉兴一中实验学校','嘉兴秀洲现代实验学校','嘉兴南湖国际实验学校','嘉善新世纪学校']},
    {city:'湖州市',names:['湖州中学西山漾校区','湖州新世纪外国语学校','湖州帕丁顿双语学校','德清莫干山外国语学校']},
    {city:'金华市',names:['金华外国语学校','义乌外国语学校','东阳外国语学校','永康外国语学校','金华荣光国际学校']},
    {city:'衢州市',names:['衢州华茂外国语学校','衢州白云学校','衢州仲尼中学','龙游华茂外国语学校']},
    {city:'舟山市',names:['舟山南海实验学校','舟山绿城育华学校','岱山实验学校']},
    {city:'台州市',names:['台州书生中学','台州双语学校','台州学院附属中学','温岭实验中学','玉环实验学校']},
    {city:'丽水市',names:['丽水外国语实验学校','丽水市文元学校','缙云实验中学','青田华侨国际学校']}
  ];
  const data = store.getDefaultData(); let sid = 1;
  sampleSchools.forEach(group => {
    group.names.forEach(name => {
      const type = SCHOOL_TYPES[Math.floor(Math.random()*4)];
      const hasDelivery = Math.random() > 0.3;
      const hasOpp = Math.random() > 0.4;
      const school = {
        id: 'S'+sid, name, city: group.city, district: group.city.replace('市','') + '区', schoolType: [type],
        principal: '校长'+sid, principalTitle: '校长',
        contact: '老师'+sid, contactTitle: ['主任','年级组长','教研组长'][Math.floor(Math.random()*3)],
        phone: '138'+String(Math.floor(Math.random()*1e8)).padStart(8,'0'), wechatEmail: 'wechat_'+sid,
        signDate: '2023-0'+Math.floor(Math.random()*9+1)+'-'+String(Math.floor(Math.random()*28+1)).padStart(2,'0'),
        totalAmount: Math.floor(Math.random()*300+50), remark: ''
      };
      data.schools.push(school);
      if (hasDelivery) {
        const prods = []; const count = Math.floor(Math.random()*3)+1;
        for (let i=0;i<count;i++) prods.push(PRODUCT_TYPES[Math.floor(Math.random()*PRODUCT_TYPES.length)]);
        data.deliveries.push({
          id: 'D'+sid, schoolId: school.id, name: name + '智慧校园建设项目',
          productTypes: [...new Set(prods)],
          quantities: prods.reduce((a,b)=>{a[b]=(a[b]||0)+Math.floor(Math.random()*20+5);return a;},{}),
          deployLocation: '主校区/教学楼/办公室',
          progress: DELIVERY_PROGRESS[Math.floor(Math.random()*DELIVERY_PROGRESS.length)],
          managerId: '', planDate: '2024-'+String(Math.floor(Math.random()*12+1)).padStart(2,'0')+'-15',
          actualDate: Math.random()>0.5?'2024-'+String(Math.floor(Math.random()*12+1)).padStart(2,'0')+'-20':'', remark: ''
        });
      }
      if (hasOpp) {
        const prods = []; const count = Math.floor(Math.random()*2)+1;
        for (let i=0;i<count;i++) prods.push(PRODUCT_TYPES[Math.floor(Math.random()*PRODUCT_TYPES.length)]);
        data.opportunities.push({
          id: 'O'+sid, schoolId: school.id, name: name + '二期扩容商机',
          stage: OPPORTUNITY_STAGES[Math.floor(Math.random()*OPPORTUNITY_STAGES.length)],
          products: [...new Set(prods)], amount: Math.floor(Math.random()*150+20),
          signDate: '2024-'+String(Math.floor(Math.random()*12+1)).padStart(2,'0')+'-15', salesId: '',
          milestones: '1.初步接触\n2.需求对接\n3.方案输出', risks: '', remark: ''
        });
      }
      data.stakeholders.push({
        id: 'ST'+sid, name: '干系人'+sid, schoolId: school.id,
        title: ['校长','副校长','教务主任','信息中心主任'][Math.floor(Math.random()*4)],
        phone: '139'+String(Math.floor(Math.random()*1e8)).padStart(8,'0'), wechatEmail: 'wx_'+sid,
        type: STAKEHOLDER_TYPES[Math.floor(Math.random()*STAKEHOLDER_TYPES.length)],
        records: '2024-01-15 首次拜访，介绍产品方案\n2024-02-20 校方提出预算审批流程'
      });
      sid++;
    });
  });
  const personNames = ['张伟','李娜','王强','刘洋','陈静','杨帆','赵敏','孙杰','周婷','吴磊','郑涛','钱程'];
  personNames.forEach((n,i)=>{
    data.persons.push({
      id: 'P'+(i+1), name: n, role: ROLES[i%ROLES.length],
      cities: [CITIES[Math.floor(Math.random()*CITIES.length)], CITIES[Math.floor(Math.random()*CITIES.length)]],
      schoolIds: [], phone: '137'+String(Math.floor(Math.random()*1e8)).padStart(8,'0'), status: '在职'
    });
  });
  return data;
}

const app = {
  data: null, currentPage: 'home', currentCity: null, hoveredCity: null, charts: {}, modalStack: [],

  init() {
    store.init(); this.data = store.get();
    const appVer = localStorage.getItem('zhejiang_app_ver');
    if (appVer !== '3') {
      localStorage.setItem('zhejiang_app_ver', '3');
      localStorage.removeItem(store.key);
      localStorage.removeItem('zhejiang_csv_imported_v10');
      store.init();
      this.data = store.get();
    }
    if (this.data.schools.length === 0) {
      this.data = generateMockData(); store.set(this.data);
      this.toast('已加载示例数据，你可以编辑或导入真实数据','info');
    }
    this.importInTransitData();
    this.bindNav(); this.bindSearch(); this.updateStorageInfo(); this.go('home');
  },

  bindNav() {
    document.querySelectorAll('.nav-item').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
        el.classList.add('active'); this.go(el.dataset.page);
      });
    });
  },

  bindSearch() {
    const input = document.getElementById('globalSearch'); let timer;
    input.addEventListener('input', e => { clearTimeout(timer); timer = setTimeout(()=>this.handleSearch(e.target.value), 300); });
    input.addEventListener('keydown', e => { if(e.key==='Enter') this.handleSearch(input.value); });
  },

  handleSearch(q) {
    q = (q||'').trim(); if (!q) return;
    const s = this.data.schools.find(x=>x.name.includes(q)||x.city.includes(q));
    if (s) { this.openSchoolModal(s.id); }
    else { this.toast('未找到匹配的学校','warning'); }
  },

  go(page, city) {
    this.currentPage = page; this.currentCity = city || null;
    const content = document.getElementById('pageContent');
    const title = document.getElementById('pageTitle');
    const sub = document.getElementById('pageSubtitle');
    content.innerHTML = ''; sub.classList.add('hidden');
    switch(page){
      case 'home': title.textContent='浙江省民办校作战地图'; this.renderHome(content); break;
      case 'city': title.textContent=(city||'地市')+'业务详情'; sub.textContent=city||''; sub.classList.remove('hidden'); this.renderCityDetail(content, city||CITIES[0]); break;
      case 'schools': title.textContent='学校档案管理'; this.renderSchoolList(content); break;
      case 'deliveries': title.textContent='交付项目管理'; this.renderDeliveryList(content); break;
      case 'opportunities': title.textContent='商机管理'; this.renderOpportunityList(content); break;
      case 'persons': title.textContent='人员责任管理'; this.renderPersonList(content); break;
      case 'data': title.textContent='数据导入/导出'; this.renderDataPage(content); break;
    }
  },

  renderHome(container) {
    const stats = this.computeProvinceStats();
    const topCities = this.computeCityStats().sort((a,b)=>b.schoolCount-a.schoolCount).slice(0,3);
    container.innerHTML = `
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        ${this.statCard('合作学校总数', stats.schoolCount, 'ri-school-line', 'border-blue-500', 'bg-blue-50 text-blue-600')}
        ${this.statCard('在途交付项目', stats.deliveryCount, 'ri-truck-line', 'border-emerald-500', 'bg-emerald-50 text-emerald-600')}
        ${this.statCard('在途商机数', stats.opportunityCount, 'ri-lightbulb-line', 'border-amber-500', 'bg-amber-50 text-amber-600')}
        ${this.statCard('累计签约金额', stats.totalAmount+'万', 'ri-money-cny-circle-line', 'border-rose-500', 'bg-rose-50 text-rose-600')}
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2 card p-4">
          <div class="flex items-center justify-between mb-3">
            <h3 class="font-bold text-slate-800">浙江省地市业务分布</h3>
            <div class="text-xs text-slate-500">点击地市下钻 · 右键快速编辑</div>
          </div>
          <div id="mapContainer"></div>
        </div>
        <div class="space-y-6">
          <div class="card p-4">
            <h3 class="font-bold text-slate-800 mb-3">地市业务 TOP3</h3>
            <div class="space-y-3">
              ${topCities.map((c,i)=>`
                <div class="flex items-center gap-3 p-3 rounded-lg bg-slate-50 hover:bg-slate-100 cursor-pointer" onclick="app.go('city','${c.name}')">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-white ${i===0?'bg-amber-500':i===1?'bg-slate-400':'bg-orange-400'}">${i+1}</div>
                  <div class="flex-1"><div class="font-semibold">${c.name}</div><div class="text-xs text-slate-500">${c.schoolCount}所学校 · ${c.deliveryCount}个交付 · ${c.opportunityCount}个商机</div></div>
                  <div class="font-bold text-slate-700">${c.totalAmount}万</div>
                </div>
              `).join('')}
            </div>
          </div>
          <div class="card p-4">
            <h3 class="font-bold text-slate-800 mb-3">业务状态概览</h3>
            <div id="overviewChart" class="chart-container"></div>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mt-6">
        <div class="card p-4"><h3 class="font-bold text-slate-800 mb-3">产品交付类型占比</h3><div id="productChart" class="chart-container"></div></div>
        <div class="card p-4"><h3 class="font-bold text-slate-800 mb-3">商机阶段分布</h3><div id="stageChart" class="chart-container"></div></div>
      </div>
    `;
    setTimeout(()=>{ this.renderMap(); this.renderOverviewChart(stats); this.renderProductChart(); this.renderStageChart(); }, 0);
  },

  statCard(label,value,icon,borderClass,iconClass){
    return `<div class="stat-card p-4 ${borderClass}"><div class="flex items-center justify-between"><div><div class="text-sm text-slate-500 mb-1">${label}</div><div class="text-2xl font-bold text-slate-800">${value}</div></div><div class="w-12 h-12 rounded-xl flex items-center justify-center text-xl ${iconClass}"><i class="${icon}"></i></div></div></div>`;
  },

  renderMap() {
    echarts.registerMap('zhejiang', zhejiangGeoJSON);
    const cityStats = this.computeCityStats();
    const data = cityStats.map(c=>({name:c.name,value:c.schoolCount,delivery:c.deliveryCount,opportunity:c.opportunityCount,amount:c.totalAmount}));
    const chart = echarts.init(document.getElementById('mapContainer'));
    this.charts.map = chart;
    chart.setOption({
      tooltip: {
        trigger: 'item', backgroundColor: 'rgba(255,255,255,0.95)', borderColor: '#e2e8f0', textStyle: { color: '#1e293b' },
        formatter: p => `<div class="font-bold mb-1">${p.name}</div>
          <div class="text-xs space-y-1">
            <div>合作学校: <b>${p.data.value}</b></div>
            <div>在途交付: <b>${p.data.delivery}</b></div>
            <div>在途商机: <b>${p.data.opportunity}</b></div>
            <div>签约金额: <b>${p.data.amount}万</b></div>
          </div>`
      },
      visualMap: { min: 0, max: Math.max(...data.map(d=>d.value))||10, left: 'left', bottom: '20', text: ['高','低'], inRange: { color: ['#dbeafe','#3b82f6','#1e40af'] }, calculable: true },
      series: [{ name: '浙江民办校', type: 'map', map: 'zhejiang', roam: true, scaleLimit: { min: 0.8, max: 3 }, label: { show: true, fontSize: 11, color: '#334155' }, emphasis: { label: { color: '#fff' }, itemStyle: { areaColor: '#f59e0b' } }, itemStyle: { borderColor: '#94a3b8', borderWidth: 1, areaColor: '#fff' }, data }]
    });
    chart.on('click', params => this.go('city', params.name));
    chart.on('mouseover', params => { this.hoveredCity = params.name; });
    chart.on('mouseout', () => { this.hoveredCity = null; });
    document.getElementById('mapContainer').addEventListener('contextmenu', e => { e.preventDefault(); this.showContextMenu(e.clientX, e.clientY); });
    window.addEventListener('resize', () => chart.resize());
  },

  renderOverviewChart(stats){
    const el = document.getElementById('overviewChart'); if(!el) return;
    const chart = echarts.init(el); this.charts.overview = chart;
    chart.setOption({ color: ['#3b82f6','#10b981','#f59e0b'], legend: { bottom: 0 }, series: [{ type: 'pie', radius: ['40%','70%'], avoidLabelOverlap: false, label: { show: false }, data: [{value: stats.schoolCount, name:'合作学校'},{value: stats.deliveryCount, name:'在途交付'},{value: stats.opportunityCount, name:'在途商机'}] }] });
  },

  renderProductChart(){
    const el = document.getElementById('productChart'); if(!el) return;
    const counts = {}; this.data.deliveries.forEach(d=>{ d.productTypes.forEach(t=>{ counts[t]=(counts[t]||0)+Object.values(d.quantities||{}).reduce((a,b)=>a+b,0); }); });
    const chart = echarts.init(el); this.charts.product = chart;
     chart.setOption({ tooltip: { trigger: 'item' }, legend: { bottom: 0, type: 'scroll' }, series: [{ type: 'pie', radius: '60%', data: Object.entries(counts).filter(([k])=>k!=='其他'&&k!=='小G/B-综合解决方案'&&k!=='智慧体育').map(([k,v])=>({name:k,value:v})).sort((a,b)=>b.value-a.value) }] });
  },

  renderStageChart(){
    const el = document.getElementById('stageChart'); if(!el) return;
    const counts = {}; this.data.opportunities.forEach(o=>{ counts[o.stage]=(counts[o.stage]||0)+1; });
    const chart = echarts.init(el); this.charts.stage = chart;
    chart.setOption({ color: ['#94a3b8','#60a5fa','#3b82f6','#f59e0b','#10b981','#ef4444'], tooltip: { trigger: 'item' }, xAxis: { type: 'category', data: OPPORTUNITY_STAGES, axisLabel: { rotate: 30, fontSize: 10 } }, yAxis: { type: 'value' }, series: [{ data: OPPORTUNITY_STAGES.map(s=>counts[s]||0), type: 'bar', barWidth: '60%', itemStyle: { borderRadius: [4,4,0,0] } }] });
  },

  renderCityDetail(container, city){
    const schools = this.data.schools.filter(s=>s.city===city);
    const deliveries = this.data.deliveries.filter(d=>schools.some(s=>s.id===d.schoolId));
    const opportunities = this.data.opportunities.filter(o=>schools.some(s=>s.id===o.schoolId));
    const totalAmount = schools.reduce((a,s)=>a+(+s.totalAmount||0),0);
    container.innerHTML = `
      <div class="mb-4 flex items-center gap-3">
        <button class="btn px-3 py-1.5 rounded-lg bg-slate-100 text-sm" onclick="app.go('home')"><i class="ri-arrow-left-line"></i> 返回全省地图</button>
        <h3 class="text-lg font-bold">${city}</h3>
      </div>
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        ${this.statCard('合作学校', schools.length, 'ri-school-line', 'border-blue-500', 'bg-blue-50 text-blue-600')}
        ${this.statCard('在途交付', deliveries.length, 'ri-truck-line', 'border-emerald-500', 'bg-emerald-50 text-emerald-600')}
        ${this.statCard('在途商机', opportunities.length, 'ri-lightbulb-line', 'border-amber-500', 'bg-amber-50 text-amber-600')}
        ${this.statCard('签约金额', totalAmount+'万', 'ri-money-cny-circle-line', 'border-rose-500', 'bg-rose-50 text-rose-600')}
      </div>
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
        <div class="card p-4"><h3 class="font-bold mb-2">商机阶段分布</h3><div id="cityStageChart" style="height:240px"></div></div>
        <div class="card p-4"><h3 class="font-bold mb-2">交付进度分布</h3><div id="cityProgressChart" style="height:240px"></div></div>
        <div class="card p-4"><h3 class="font-bold mb-2">产品类型占比</h3><div id="cityProductChart" style="height:240px"></div></div>
      </div>
      <div class="card p-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-bold">学校列表（${schools.length}所）</h3>
          <button class="btn bg-primary text-white px-3 py-1.5 rounded-lg text-sm" onclick="app.openSchoolModal(null,'${city}')">+ 新增学校</button>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm table">
            <thead><tr><th>学校名称</th><th>办学类型</th><th>负责人</th><th>联系电话</th><th>签约金额</th><th>交付</th><th>商机</th><th>操作</th></tr></thead>
            <tbody>
              ${schools.map(s=>{
                const sc = deliveries.filter(d=>d.schoolId===s.id).length;
                const oc = opportunities.filter(o=>o.schoolId===s.id).length;
                return `<tr>
                  <td class="font-medium text-slate-800">${s.name}</td>
                  <td>${s.schoolType.join('/')}</td>
                  <td>${s.principal} <span class="text-slate-400 text-xs">${s.principalTitle}</span></td>
                  <td>${s.phone}</td>
                  <td class="font-semibold">${s.totalAmount}万</td>
                  <td><span class="tag bg-emerald-100 text-emerald-700">${sc}</span></td>
                  <td><span class="tag bg-amber-100 text-amber-700">${oc}</span></td>
                  <td>
                    <button class="text-blue-600 hover:underline text-xs mr-2" onclick="app.openSchoolModal('${s.id}')">编辑</button>
                    <button class="text-rose-600 hover:underline text-xs" onclick="app.deleteSchool('${s.id}')">删除</button>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>
    `;
    setTimeout(()=>{
      const sc = echarts.init(document.getElementById('cityStageChart'));
      const stageCounts = {}; opportunities.forEach(o=>stageCounts[o.stage]=(stageCounts[o.stage]||0)+1);
      sc.setOption({ xAxis:{type:'category',data:OPPORTUNITY_STAGES,axisLabel:{rotate:30,fontSize:10}}, yAxis:{type:'value'}, series:[{type:'bar',data:OPPORTUNITY_STAGES.map(s=>stageCounts[s]||0),itemStyle:{borderRadius:[4,4,0,0]}}] });
      const pc = echarts.init(document.getElementById('cityProgressChart'));
      const progCounts = {}; deliveries.forEach(d=>progCounts[d.progress]=(progCounts[d.progress]||0)+1);
      pc.setOption({ xAxis:{type:'category',data:DELIVERY_PROGRESS,axisLabel:{fontSize:10}}, yAxis:{type:'value'}, series:[{type:'bar',data:DELIVERY_PROGRESS.map(s=>progCounts[s]||0),itemStyle:{color:'#10b981',borderRadius:[4,4,0,0]}}] });
      const prc = echarts.init(document.getElementById('cityProductChart'));
      const prodCounts = {}; deliveries.forEach(d=>d.productTypes.forEach(t=>prodCounts[t]=(prodCounts[t]||0)+1));
      prc.setOption({ series:[{type:'pie',radius:'60%',data:Object.entries(prodCounts).filter(([k])=>k!=='小G/B-综合解决方案'&&k!=='智慧体育').map(([k,v])=>({name:k,value:v}))}] });
      window.addEventListener('resize',()=>{sc.resize();pc.resize();prc.resize();});
    },0);
  },

  renderSchoolList(container){
    container.innerHTML = `
      <div class="card p-4">

  importCSV(){
    const fileInput = document.getElementById('importFile');
    const type = document.getElementById('importType').value;
    const resultDiv = document.getElementById('importResult');
    if (!fileInput.files.length) { this.toast('请选择文件','error'); return; }
    const file = fileInput.files[0]; const reader = new FileReader();
    reader.onload = e => {
      const text = e.target.result; const lines = text.split(/\r?\n/).filter(l=>l.trim());
      if (lines.length < 2) { resultDiv.textContent='文件内容为空或格式错误'; resultDiv.className='p-3 rounded-lg text-sm bg-rose-50 text-rose-700'; resultDiv.classList.remove('hidden'); return; }
      let success=0, fail=0, errors=[];
      for (let i=1;i<lines.length;i++) {
        const cols = lines[i].split(',');
        try {
          if (type==='schools') {
            const name=cols[0]?.trim(); if(!name) continue;
            const city=(cols[2]||'杭州市').trim();
            const idx = this.data.schools.findIndex(s=>s.name===name);
            const rec = { id: idx>=0?this.data.schools[idx].id:'S'+Date.now()+i, name, city, district:(cols[3]||'').trim(), schoolType:(cols[4]||'').split('/').filter(Boolean), principal:(cols[5]||'').trim(), principalTitle:(cols[6]||'').trim(), contact:(cols[7]||'').trim(), contactTitle:(cols[8]||'').trim(), phone:(cols[9]||'').trim(), wechatEmail:(cols[10]||'').trim(), signDate:(cols[11]||'').trim(), totalAmount:+cols[12]||0, remark:(cols[13]||'').trim() };
            if (idx>=0) this.data.schools[idx]=rec; else this.data.schools.push(rec); success++;
          } else if (type==='deliveries') {
            const schoolName=cols[0]?.trim(); const s=this.data.schools.find(x=>x.name===schoolName); if(!s) { fail++; errors.push(`第${i+1}行：学校不存在`); continue; }
            const rec={ id:'D'+Date.now()+i, schoolId:s.id, name:(cols[1]||'').trim(), productTypes:(cols[2]||'').split('/').filter(Boolean), quantities:this.safeJson(cols[3]||'{}'), deployLocation:(cols[4]||'').trim(), progress:(cols[5]||'未启动').trim(), managerId:'', planDate:(cols[7]||'').trim(), actualDate:(cols[8]||'').trim(), remark:(cols[9]||'').trim() };
            this.data.deliveries.push(rec); success++;
          } else if (type==='opportunities') {
            const schoolName=cols[0]?.trim(); const s=this.data.schools.find(x=>x.name===schoolName); if(!s) { fail++; continue; }
            const rec={ id:'O'+Date.now()+i, schoolId:s.id, name:(cols[1]||'').trim(), stage:(cols[2]||'初步接触').trim(), products:(cols[3]||'').split('/').filter(Boolean), amount:+cols[4]||0, signDate:(cols[5]||'').trim(), salesId:'', milestones:(cols[7]||'').trim(), risks:(cols[8]||'').trim(), remark:(cols[9]||'').trim() };
            this.data.opportunities.push(rec); success++;
          } else if (type==='persons') {
            const rec={ id:'P'+Date.now()+i, name:(cols[0]||'').trim(), role:(cols[1]||'驻点销售').trim(), cities:(cols[2]||'').split('/').filter(Boolean), schoolIds:(cols[3]||'').split('/').map(n=>this.data.schools.find(s=>s.name===n.trim())?.id).filter(Boolean), phone:(cols[4]||'').trim(), status:(cols[5]||'在职').trim() };
            this.data.persons.push(rec); success++;
          } else if (type==='stakeholders') {
            const schoolName=cols[1]?.trim(); const s=this.data.schools.find(x=>x.name===schoolName); if(!s) { fail++; continue; }
            const rec={ id:'ST'+Date.now()+i, name:(cols[0]||'').trim(), schoolId:s.id, title:(cols[2]||'').trim(), phone:(cols[3]||'').trim(), wechatEmail:(cols[4]||'').trim(), type:(cols[5]||'对接人').trim(), records:(cols[6]||'').trim() };
            this.data.stakeholders.push(rec); success++;
          }
        } catch(err){ fail++; errors.push(`第${i+1}行：${err.message}`); }
      }
      store.set(this.data);

  exportCSV(type){
    let csv='';
    if (type==='schools') {
      csv = '学校名称,所在地区-省,所在地区-地市,所在地区-区县,办学类型,学校负责人,负责人职务,核心对接老师,对接人职务,联系电话,微信/邮箱,合作签约时间,项目总签约金额,备注\n';
      this.data.schools.forEach(s=>{ csv+=`${this.csvField(s.name)},浙江省,${s.city},${s.district},${s.schoolType.join('/')},${s.principal},${s.principalTitle},${s.contact},${s.contactTitle},${s.phone},${s.wechatEmail},${s.signDate},${s.totalAmount},${this.csvField(s.remark)}\n`; });
    } else if (type==='deliveries') {
      csv = '学校名称,交付项目名称,交付产品类型,产品数量JSON,部署位置,交付进度,交付负责人,计划交付时间,实际交付时间,交付备注\n';
      this.data.deliveries.forEach(d=>{ const s=this.data.schools.find(x=>x.id===d.schoolId); csv+=`${this.csvField(s?s.name:'')},${this.csvField(d.name)},${d.productTypes.join('/')},"${JSON.stringify(d.quantities||{})}",${d.deployLocation},${d.progress},${this.personName(d.managerId)},${d.planDate},${d.actualDate},${this.csvField(d.remark)}\n`; });
    } else if (type==='opportunities') {
      csv = '学校名称,商机名称,商机阶段,意向产品,预计签约金额,预计签约时间,销售负责人,核心跟进节点,商机风险,商机备注\n';
      this.data.opportunities.forEach(o=>{ const s=this.data.schools.find(x=>x.id===o.schoolId); csv+=`${this.csvField(s?s.name:'')},${this.csvField(o.name)},${o.stage},${o.products.join('/')},${o.amount},${o.signDate},${this.personName(o.salesId)},"${this.csvField(o.milestones)}","${this.csvField(o.risks)}",${this.csvField(o.remark)}\n`; });
    } else if (type==='persons') {
      csv = '人员姓名,人员角色,负责地市,负责学校,联系电话,人员状态\n';
      this.data.persons.forEach(p=>{ const names=p.schoolIds.map(id=>this.data.schools.find(s=>s.id===id)?.name).filter(Boolean); csv+=`${p.name},${p.role},${p.cities.join('/')},${names.join('/')},${p.phone},${p.status}\n`; });
    } else if (type==='stakeholders') {
      csv = '干系人姓名,所属学校,职务,联系电话,微信/邮箱,干系类型,跟进记录\n';
      this.data.stakeholders.forEach(st=>{ const s=this.data.schools.find(x=>x.id===st.schoolId); csv+=`${st.name},${this.csvField(s?s.name:'')},${st.title},${st.phone},${st.wechatEmail},${st.type},"${this.csvField(st.records)}"\n`; });
    }
    this.downloadFile('﻿'+csv, `导出_${type}.csv`, 'text/csv;charset=utf-8;');
  },

  csvField(v){ const s=String(v||''); if (s.includes(',')||s.includes('"')||s.includes('\n')) return '"'+s.replace(/"/g,'""')+'"'; return s; },

  exportAllData(){

  downloadFile(content, filename, mime){
    const blob = new Blob([content], {type:mime}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href=url; a.download=filename; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  },

  refreshPage(){
    const content = document.getElementById('pageContent');
    switch(this.currentPage){
      case 'home': this.renderHome(content); break;
      case 'city': this.renderCityDetail(content, this.currentCity); break;
      case 'schools': this.renderSchoolList(content); break;
      case 'deliveries': this.renderDeliveryList(content); break;
      case 'opportunities': this.renderOpportunityList(content); break;
      case 'persons': this.renderPersonList(content); break;
      case 'data': this.renderDataPage(content); break;
    }
    this.updateStorageInfo();
  },
